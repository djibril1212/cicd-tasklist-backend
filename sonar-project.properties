# --- Identification du projet ---
sonar.projectKey=tasklist-backend
sonar.projectName=tasklist-backend
sonar.projectVersion=1.0.0

# --- Serveur SonarQube local (Docker) ---
sonar.host.url=http://localhost:9000

# --- Sources & tests ---
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.test.ts

# --- Exclusions de l'analyse ---
sonar.exclusions=node_modules/**,dist/**,coverage/**,reports/**,prisma/**

# --- Exclusions de la couverture ---
# Fichiers sans logique testable (bootstrap, client Prisma)
sonar.coverage.exclusions=src/server.ts,src/lib/prisma.ts,**/*.config.ts

# --- Rapport de couverture (LCOV généré par vitest/v8) ---
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Encodage ---
sonar.sourceEncoding=UTF-8
